# ============================================================
# VenuePro SaaS — Nginx Configuration
# Reverse proxies /api/* to Node (port 5000)
# Serves frontend static files from client/dist in production
# ============================================================

# HTTP → HTTPS redirect (only if SSL is configured)
server {
    listen 80;
    server_name venuepro.live www.venuepro.live _;
    
    # If you set up SSL, uncomment the return below
    # and comment out the location blocks.
    # return 301 https://$host$request_uri;

    # ── API Reverse Proxy ─────────────────────────────────
    location /api/ {
        # Allow large uploads (matches Express limit)
        client_max_body_size 10m;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeout for long-running requests
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }

    # ── Health Check ──────────────────────────────────────
    location /api/health {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Swagger API Docs ──────────────────────────────────
    location /api-docs {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api-docs.json {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend Static Files ─────────────────────────────
    # Serves the Vite build output
    root /root/venuepro-saas/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Assets Cache ──────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

